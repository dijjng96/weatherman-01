<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해외판매 환율 계산기</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4f6fa;
  --white: #ffffff;
  --surface2: #f8f9fc;
  --border: #e8ebf2;
  --border2: #d0d5e8;
  --text: #1a1d2e;
  --muted: #7a809a;
  --accent: #3d5afe;
  --accent-light: #eef0ff;
  --green: #00b67a;
  --green-light: #e6f9f2;
  --red: #f53b3b;
  --red-light: #fff1f1;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
  --shadow-focus: 0 0 0 3px rgba(61,90,254,0.15);
  --sans: 'Outfit', 'Noto Sans KR', sans-serif;
}

body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

/* HEADER */
header {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 0 32px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--text); letter-spacing: -0.02em; }
.logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: white; font-weight: 700; }
.header-right { display: flex; align-items: center; gap: 12px; }
.live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--green); background: var(--green-light); padding: 5px 12px; border-radius: 20px; }
.live-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.update-text { font-size: 12px; color: var(--muted); }
.refresh-btn { background: none; border: 1.5px solid var(--border2); border-radius: 8px; color: var(--muted); font-family: var(--sans); font-size: 12px; font-weight: 600; padding: 6px 14px; cursor: pointer; transition: all 0.18s; }
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* LAYOUT */
.page-body { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; padding: 32px 24px 60px; align-items: flex-start; }
.main-col { flex: 1; min-width: 0; }

/* SIDEBAR */
.sidebar {
  width: 260px; flex-shrink: 0;
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 16px; box-shadow: var(--shadow-sm);
  position: sticky; top: 76px;
  max-height: calc(100vh - 96px); overflow-y: auto;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.sidebar-header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--white); z-index: 1;
  border-radius: 16px 16px 0 0;
}
.sidebar-title { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.sidebar-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

.rate-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 18px; border-bottom: 1px solid var(--border);
  transition: background 0.15s; cursor: default;
}
.rate-row:last-child { border-bottom: none; border-radius: 0 0 16px 16px; }
.rate-row:hover { background: var(--surface2); }

.rate-flag { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; background: var(--bg); }
.rate-info { flex: 1; min-width: 0; }
.rate-code { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
.rate-val { font-size: 11px; color: var(--muted); margin-top: 1px; }
.rate-change { text-align: right; flex-shrink: 0; }
.change-pct { font-size: 12px; font-weight: 700; padding: 3px 8px; border-radius: 6px; }
.change-pct.up { color: var(--red); background: var(--red-light); }
.change-pct.down { color: var(--green); background: var(--green-light); }
.change-pct.flat { color: var(--muted); background: var(--surface2); }
.change-abs { font-size: 10px; color: var(--muted); margin-top: 2px; text-align: right; }

.sidebar-loading { padding: 20px 18px; display: flex; flex-direction: column; gap: 10px; }
.s-skel { height: 40px; background: linear-gradient(90deg,#f0f2f8 25%,#e4e7f0 50%,#f0f2f8 75%); background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: 8px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* KRW HERO */
.krw-hero {
  background: var(--accent); border-radius: 20px; padding: 28px 32px;
  margin-bottom: 24px; color: white; position: relative; overflow: hidden;
  box-shadow: 0 8px 32px rgba(61,90,254,0.22);
}
.krw-hero::before { content:''; position:absolute; top:-60px; right:-60px; width:220px; height:220px; border-radius:50%; background:rgba(255,255,255,0.07); }
.krw-hero::after  { content:''; position:absolute; bottom:-40px; right:70px; width:150px; height:150px; border-radius:50%; background:rgba(255,255,255,0.05); }
.krw-hero-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.krw-label-group { display:flex; align-items:center; gap:12px; }
.krw-flag { width:40px; height:40px; border-radius:50%; object-fit:cover; border:2px solid rgba(255,255,255,0.4); box-shadow:0 2px 8px rgba(0,0,0,0.15); }
.krw-name { font-size:17px; font-weight:600; }
.krw-code { font-size:12px; opacity:0.65; font-weight:400; margin-top:2px; }
.krw-hint-text { font-size:12px; opacity:0.65; font-weight:400; text-align:right; }
.krw-input-row { display:flex; align-items:center; gap:12px; background:rgba(255,255,255,0.15); border:1.5px solid rgba(255,255,255,0.3); border-radius:14px; padding:12px 20px; transition:all 0.2s; }
.krw-input-row:focus-within { background:rgba(255,255,255,0.22); border-color:rgba(255,255,255,0.55); }
.krw-sym { font-size:24px; font-weight:300; opacity:0.7; }
.krw-input { flex:1; background:none; border:none; outline:none; font-family:var(--sans); font-size:34px; font-weight:700; color:white; letter-spacing:-0.03em; min-width:0; }
.krw-input::placeholder { color:rgba(255,255,255,0.3); }
.krw-output-row { display:none; margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.15); gap:8px; flex-wrap:wrap; }
.krw-output-row.show { display:flex; }
.krw-mini-chip { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25); border-radius:8px; padding:5px 11px; font-size:12px; font-weight:600; color:rgba(255,255,255,0.92); display:flex; align-items:center; gap:6px; }
.mini-flag { width:16px; height:16px; border-radius:50%; object-fit:cover; }

/* SECTION */
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.section-title { font-size:12px; font-weight:700; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; }
.filter-tabs { display:flex; background:var(--white); border:1px solid var(--border); border-radius:10px; padding:3px; gap:2px; box-shadow:var(--shadow-sm); }
.tab { padding:5px 12px; border-radius:7px; font-size:12px; font-weight:600; cursor:pointer; border:none; background:none; color:var(--muted); font-family:var(--sans); transition:all 0.16s; }
.tab.active { background:var(--accent); color:white; box-shadow:0 2px 6px rgba(61,90,254,0.3); }

/* CURRENCY GRID */
.currency-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(290px, 1fr)); gap:14px; }

.currency-card {
  background:var(--white); border:1.5px solid var(--border); border-radius:14px;
  padding:16px 18px 14px; transition:all 0.2s; box-shadow:var(--shadow-sm);
  animation:fadeUp 0.35s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.currency-card:hover { border-color:var(--border2); box-shadow:var(--shadow-md); transform:translateY(-2px); }
.currency-card:focus-within { border-color:var(--accent); box-shadow:var(--shadow-focus); transform:translateY(-2px); }

.card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.card-left { display:flex; align-items:center; gap:10px; }
.card-flag { width:38px; height:38px; border-radius:50%; object-fit:cover; border:1.5px solid var(--border); box-shadow:0 1px 4px rgba(0,0,0,0.08); background:var(--bg); flex-shrink:0; }
.card-code { font-size:15px; font-weight:700; color:var(--text); letter-spacing:-0.01em; }
.card-name { font-size:11px; color:var(--muted); margin-top:1px; font-weight:400; }
.rate-chip { font-size:11px; font-weight:600; color:var(--muted); background:var(--surface2); border:1px solid var(--border); padding:3px 9px; border-radius:20px; white-space:nowrap; flex-shrink:0; }

/* BIDIRECTIONAL INPUTS */
.calc-rows { display:flex; flex-direction:column; gap:8px; }

.calc-row {
  display:flex; align-items:center; gap:0;
  background:var(--surface2); border:1.5px solid var(--border); border-radius:10px;
  overflow:hidden; transition:all 0.18s;
}
.calc-row:focus-within { border-color:var(--accent); background:white; box-shadow:var(--shadow-focus); }

.row-label {
  display:flex; align-items:center; gap:6px;
  padding:0 12px; height:44px; background:var(--bg);
  border-right:1.5px solid var(--border); flex-shrink:0;
  min-width:68px;
}
.row-flag { width:18px; height:18px; border-radius:50%; object-fit:cover; }
.row-code { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:0.03em; }

.calc-input {
  flex:1; background:none; border:none; outline:none;
  font-family:var(--sans); font-size:18px; font-weight:700;
  color:var(--text); text-align:right; padding:0 14px;
  height:44px; min-width:0; letter-spacing:-0.02em;
}
.calc-input::placeholder { color:#cdd0db; font-weight:400; }

.calc-row.krw-row .row-label { background:var(--accent-light); border-right-color:#c5ccff; }
.calc-row.krw-row .row-code { color:var(--accent); }
.calc-row.krw-row:focus-within .row-label { background:#dde1ff; }

.skeleton { background:linear-gradient(90deg,#f0f2f8 25%,#e4e7f0 50%,#f0f2f8 75%); background-size:200% 100%; animation:shimmer 1.3s infinite; border-radius:14px; height:140px; border:1.5px solid var(--border); }
.error-msg { grid-column:1/-1; text-align:center; padding:28px; color:var(--red); font-size:14px; background:#fff5f5; border:1.5px solid #ffd0d0; border-radius:14px; }

/* RESPONSIVE */
@media (max-width:900px) {
  .page-body { flex-direction:column; }
  .sidebar { width:100%; position:static; max-height:none; }
  .sidebar-cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); }
  .rate-row { border-bottom:none; border-right:1px solid var(--border); }
  .rate-row:last-child { border-right:none; }
}
@media (max-width:640px) {
  header { padding:0 16px; }
  .update-text { display:none; }
  .page-body { padding:16px 14px 48px; }
  .krw-hero { padding:22px 18px; }
  .krw-input { font-size:26px; }
  .currency-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">₩</div>
    해외판매 환율 계산기
  </div>
  <div class="header-right">
    <span class="update-text" id="updateTime"></span>
    <div class="live-badge" id="liveBadge" style="display:none">
      <span class="live-dot"></span> LIVE
    </div>
    <button class="refresh-btn" onclick="fetchRates()">↻ 새로고침</button>
  </div>
</header>

<div class="page-body">

  <!-- MAIN -->
  <div class="main-col">

    <!-- KRW HERO -->
    <div class="krw-hero">
      <div class="krw-hero-top">
        <div class="krw-label-group">
          <img class="krw-flag" src="https://flagcdn.com/w80/kr.png" alt="KR" onerror="this.style.display='none'">
          <div>
            <div class="krw-name">대한민국 원화 기준</div>
            <div class="krw-code">KRW · 입력하면 모든 통화 동시 환산</div>
          </div>
        </div>
        <div class="krw-hint-text" id="krwHint">금액을 입력하세요</div>
      </div>
      <div class="krw-input-row">
        <span class="krw-sym">₩</span>
        <input class="krw-input" id="krwInput" type="text" placeholder="0" inputmode="numeric" autocomplete="off">
      </div>
      <div class="krw-output-row" id="krwOutputRow"></div>
    </div>

    <!-- GRID -->
    <div class="section-header">
      <span class="section-title">통화별 계산기 — 양방향 입력</span>
      <div class="filter-tabs">
        <button class="tab active" onclick="filterGroup(this,'all')">전체</button>
        <button class="tab" onclick="filterGroup(this,'americas')">미주</button>
        <button class="tab" onclick="filterGroup(this,'europe')">유럽</button>
        <button class="tab" onclick="filterGroup(this,'asia')">아시아</button>
      </div>
    </div>

    <div class="currency-grid" id="currencyGrid">
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
    </div>

  </div><!-- /main-col -->

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">전일 대비 환율 변동</div>
      <div class="sidebar-sub" id="sidebarSub">기준: 원화(KRW)</div>
    </div>
    <div id="sidebarBody">
      <div class="sidebar-loading">
        <div class="s-skel"></div><div class="s-skel"></div>
        <div class="s-skel"></div><div class="s-skel"></div>
        <div class="s-skel"></div><div class="s-skel"></div>
        <div class="s-skel"></div><div class="s-skel"></div>
      </div>
    </div>
  </div>

</div><!-- /page-body -->

<script>
const CURRENCIES = [
  { code:'USD', name:'미국 달러',         flag:'us', sym:'$',   group:'americas' },
  { code:'JPY', name:'일본 엔화',          flag:'jp', sym:'¥',   group:'asia' },
  { code:'EUR', name:'유로 (독일·유럽)',   flag:'eu', sym:'€',   group:'europe' },
  { code:'TWD', name:'대만 달러',          flag:'tw', sym:'NT$', group:'asia' },
  { code:'SGD', name:'싱가포르 달러',      flag:'sg', sym:'S$',  group:'asia' },
  { code:'CNY', name:'중국 위안',          flag:'cn', sym:'¥',   group:'asia' },
  { code:'HKD', name:'홍콩 달러',          flag:'hk', sym:'HK$', group:'asia' },
  { code:'GBP', name:'영국 파운드',        flag:'gb', sym:'£',   group:'europe' },
  { code:'AUD', name:'호주 달러',          flag:'au', sym:'A$',  group:'americas' },
  { code:'CAD', name:'캐나다 달러',        flag:'ca', sym:'C$',  group:'americas' },
  { code:'VND', name:'베트남 동',          flag:'vn', sym:'₫',   group:'asia' },
  { code:'THB', name:'태국 바트',          flag:'th', sym:'฿',   group:'asia' },
  { code:'IDR', name:'인도네시아 루피아',  flag:'id', sym:'Rp',  group:'asia' },
  { code:'MYR', name:'말레이시아 링깃',    flag:'my', sym:'RM',  group:'asia' },
  { code:'PHP', name:'필리핀 페소',        flag:'ph', sym:'₱',   group:'asia' },
  { code:'INR', name:'인도 루피',          flag:'in', sym:'₹',   group:'asia' },
  { code:'CHF', name:'스위스 프랑',        flag:'ch', sym:'Fr',  group:'europe' },
  { code:'SEK', name:'스웨덴 크로나',      flag:'se', sym:'kr',  group:'europe' },
  { code:'NOK', name:'노르웨이 크로네',    flag:'no', sym:'kr',  group:'europe' },
  { code:'DKK', name:'덴마크 크로네',      flag:'dk', sym:'kr',  group:'europe' },
  { code:'MXN', name:'멕시코 페소',        flag:'mx', sym:'$',   group:'americas' },
  { code:'BRL', name:'브라질 헤알',        flag:'br', sym:'R$',  group:'americas' },
];

let rates = {};
let prevRates = {};
let currentGroup = 'all';
const TOP5 = ['USD','JPY','EUR','TWD','SGD'];

function fmt(n) {
  if (n >= 10000) return n.toLocaleString('ko-KR',{maximumFractionDigits:0});
  if (n >= 100)   return n.toLocaleString('ko-KR',{maximumFractionDigits:0});
  if (n >= 1)     return n.toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2});
  if (n >= 0.01)  return n.toLocaleString('ko-KR',{minimumFractionDigits:4,maximumFractionDigits:4});
  return n.toFixed(6);
}
/* 외화 입력칸 표시 — 항상 소수점 2자리 (콤마 포함) */
function fmtForeign(n) {
  return n.toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtKrw(n)  { return '₩ ' + Math.round(n).toLocaleString('ko-KR'); }
function flagUrl(c) { return `https://flagcdn.com/w80/${c}.png`; }

/* ── FETCH (exchangerate-api.com · 10분 갱신) ── */
async function fetchRates() {
  try {
    const res  = await fetch('https://api.exchangerate-api.com/v4/latest/KRW');
    const data = await res.json();
    if (!data.rates) throw new Error();
    rates = data.rates;
    const dt = new Date(data.time_last_updated * 1000);
    document.getElementById('updateTime').textContent =
      '기준 ' + dt.toLocaleString('ko-KR',{timeZone:'Asia/Seoul',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

    document.getElementById('liveBadge').style.display = 'flex';
    renderCards();
    const kv = getRawKrw();
    if (kv > 0) propagateKrw(kv);
    fetchPrevRates(new Date());
  } catch(e) {
    try {
      const res2 = await fetch('https://open.er-api.com/v6/latest/KRW');
      const data2 = await res2.json();
      if (!data2.rates) throw new Error();
      rates = data2.rates;
      const dt2 = new Date(data2.time_last_update_utc);
      document.getElementById('updateTime').textContent =
        '기준 ' + dt2.toLocaleString('ko-KR',{timeZone:'Asia/Seoul',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      document.getElementById('liveBadge').style.display = 'flex';
      renderCards();
      const kv = getRawKrw();
      if (kv > 0) propagateKrw(kv);
      fetchPrevRates(new Date());
    } catch(e2) {
      document.getElementById('currencyGrid').innerHTML =
        '<div class="error-msg">환율 데이터를 불러올 수 없습니다.<br>인터넷 연결 확인 후 새로고침 해주세요.</div>';
    }
  }
}

async function fetchPrevRates(todayDate) {
  try {
    const d = new Date(todayDate);
    d.setDate(d.getDate() - 1);
    const ymd = d.toISOString().slice(0,10);
    const res  = await fetch(`https://open.er-api.com/v6/${ymd}?base=KRW`);
    const data = await res.json();
    if (data.result === 'success' && data.rates) {
      prevRates = data.rates;
    } else {
      // fallback: try with historical endpoint
      const res2 = await fetch(`https://api.frankfurter.app/${ymd}?from=KRW`);
      const d2   = await res2.json();
      if (d2.rates) {
        prevRates = {};
        for (const [k,v] of Object.entries(d2.rates)) prevRates[k] = v;
        prevRates['KRW'] = 1;
      }
    }
    renderSidebar();
  } catch(e) {
    try {
      const d = new Date(todayDate);
      d.setDate(d.getDate() - 1);
      const ymd = d.toISOString().slice(0,10);
      const res2 = await fetch(`https://api.frankfurter.app/${ymd}?from=KRW`);
      const d2   = await res2.json();
      if (d2.rates) {
        prevRates = {};
        for (const [k,v] of Object.entries(d2.rates)) prevRates[k] = v;
        prevRates['KRW'] = 1;
        renderSidebar();
      }
    } catch(e2) {
      document.getElementById('sidebarBody').innerHTML =
        '<div style="padding:16px 18px;font-size:12px;color:var(--muted)">전일 데이터를 불러올 수 없습니다.</div>';
    }
  }
}

/* ── SIDEBAR ── */
function renderSidebar() {
  const today = new Date();
  const ymd = today.toISOString().slice(0,10);
  document.getElementById('sidebarSub').textContent = '기준: 원화(KRW) · ' + today.toLocaleDateString('ko-KR',{month:'short',day:'numeric'}) + ' vs 전일';

  const html = CURRENCIES.map(c => {
    const cur  = rates[c.code];
    const prev = prevRates[c.code];
    if (!cur) return '';

    const per1 = 1 / cur; // 1 외화 = N 원
    let pctHtml = '<span class="change-pct flat">—</span><div class="change-abs"> </div>';

    if (prev && prev > 0) {
      const prevPer1 = 1 / prev;
      const diff = per1 - prevPer1;
      const pct  = (diff / prevPer1) * 100;
      const sign = pct > 0 ? '+' : '';
      const cls  = Math.abs(pct) < 0.01 ? 'flat' : pct > 0 ? 'up' : 'down';
      const arrow = cls === 'flat' ? '' : cls === 'up' ? '▲' : '▼';
      pctHtml = `<span class="change-pct ${cls}">${arrow} ${sign}${Math.abs(pct).toFixed(2)}%</span>
        <div class="change-abs">${diff >= 0 ? '+' : ''}${fmt(Math.abs(diff))}원</div>`;
    }

    return `<div class="rate-row">
      <img class="rate-flag" src="${flagUrl(c.flag)}" alt="${c.code}" onerror="this.style.display='none'">
      <div class="rate-info">
        <div class="rate-code">${c.code}</div>
        <div class="rate-val">₩${fmt(per1)}</div>
      </div>
      <div class="rate-change">${pctHtml}</div>
    </div>`;
  }).join('');

  document.getElementById('sidebarBody').innerHTML = html;
}

/* ── CARDS ── */
function renderCards() {
  const filtered = CURRENCIES.filter(c => currentGroup === 'all' || c.group === currentGroup);
  document.getElementById('currencyGrid').innerHTML = filtered.map((c, i) => {
    const r   = rates[c.code];
    const per1 = r ? 1/r : 0;
    return `
    <div class="currency-card" style="animation-delay:${i*0.04}s">
      <div class="card-top">
        <div class="card-left">
          <img class="card-flag" src="${flagUrl(c.flag)}" alt="${c.code}" onerror="this.style.display='none'">
          <div>
            <div class="card-code">${c.code}</div>
            <div class="card-name">${c.name}</div>
          </div>
        </div>
        <div class="rate-chip">1${c.sym} = ${per1 ? '₩'+fmt(per1) : '—'}</div>
      </div>
      <div class="calc-rows">
        <!-- 외화 → 원화 -->
        <div class="calc-row foreign-row">
          <div class="row-label">
            <img class="row-flag" src="${flagUrl(c.flag)}" alt="${c.code}" onerror="this.style.display='none'">
            <span class="row-code">${c.code}</span>
          </div>
          <input class="calc-input" id="fi_${c.code}"
            type="text" placeholder="외화 입력" inputmode="decimal" autocomplete="off"
            oninput="onForeignInput('${c.code}', this.value)"
            onfocus="resetCard('${c.code}','foreign')">
        </div>
        <!-- 원화 → 외화 -->
        <div class="calc-row krw-row">
          <div class="row-label">
            <img class="row-flag" src="https://flagcdn.com/w80/kr.png" alt="KR" onerror="this.style.display='none'">
            <span class="row-code">KRW</span>
          </div>
          <input class="calc-input" id="ki_${c.code}"
            type="text" placeholder="원화 입력" inputmode="numeric" autocomplete="off"
            oninput="onKrwCardInput('${c.code}', this.value)"
            onfocus="resetCard('${c.code}','krw')">
        </div>
      </div>
    </div>`;
  }).join('');
}

/* 외화 입력 → 원화 계산 */
function onForeignInput(code, val) {
  clearTopKrw();
  const r = rates[code];
  // 콤마 제거 후 파싱 (소수점은 유지)
  const cleaned = val.replace(/,/g,'');
  const v = parseFloat(cleaned);
  const el = document.getElementById('fi_' + code);
  const ki = document.getElementById('ki_' + code);

  if (!r || !v || v <= 0) {
    if (ki) ki.value = '';
    return;
  }

  // 외화 입력칸에 콤마 포맷 적용 (입력 중 커서 유지)
  if (el) {
    const cursor = el.selectionStart;
    const prevLen = el.value.length;
    // 소수점 이하가 있으면 보존, 없으면 그대로
    const dotIdx = cleaned.indexOf('.');
    let formatted;
    if (dotIdx >= 0) {
      const intPart = parseInt(cleaned.substring(0, dotIdx)) || 0;
      const decPart = cleaned.substring(dotIdx); // '.xx' 포함
      formatted = intPart.toLocaleString('ko-KR') + decPart;
    } else {
      formatted = (parseInt(cleaned) || 0).toLocaleString('ko-KR');
    }
    el.value = formatted;
    const diff = formatted.length - prevLen;
    try { el.setSelectionRange(cursor + diff, cursor + diff); } catch(e){}
  }

  if (ki) ki.value = Math.round(v / r).toLocaleString('ko-KR');
}

/* 카드 원화 입력 → 외화 계산 */
function onKrwCardInput(code, val) {
  clearTopKrw();
  const r = rates[code];
  // 콤마 제거 후 파싱
  const digits = val.replace(/[^0-9]/g,'');
  const num = parseInt(digits) || 0;
  const el = document.getElementById('ki_' + code);
  // 콤마 포맷 적용 + 커서 유지
  if (el) {
    const cursor = el.selectionStart;
    const prevLen = el.value.length;
    el.value = num > 0 ? num.toLocaleString('ko-KR') : '';
    const diff = el.value.length - prevLen;
    try { el.setSelectionRange(cursor + diff, cursor + diff); } catch(e){}
  }
  const fi = document.getElementById('fi_' + code);
  if (!r || !num || num <= 0) { if(fi) fi.value = ''; return; }
  const foreign = num * r;
  if (fi) fi.value = fmtForeign(foreign);
}

function resetCard(code, side) {
  // 반대쪽 input 클리어
  if (side === 'foreign') {
    const ki = document.getElementById('ki_' + code);
    if (ki) ki.value = '';
  } else {
    const fi = document.getElementById('fi_' + code);
    if (fi) fi.value = '';
  }
}

function clearTopKrw() {
  const inp = document.getElementById('krwInput'); inp.value = '';
  document.getElementById('krwHint').textContent = '금액을 입력하세요';
  document.getElementById('krwOutputRow').classList.remove('show');
  CURRENCIES.forEach(c => {
    const fi = document.getElementById('fi_' + c.code);
    const ki = document.getElementById('ki_' + c.code);
    // don't clear the card that's being typed in — handled elsewhere
  });
}

/* 상단 원화 입력 → 모든 카드 */
function propagateKrw(krwVal) {
  CURRENCIES.forEach(c => {
    const r = rates[c.code];
    if (!r) return;
    const fi = document.getElementById('fi_' + c.code);
    const ki = document.getElementById('ki_' + c.code);
    const foreign = krwVal * r;
    if (fi) fi.value = fmtForeign(foreign);
    if (ki) ki.value = '';
  });
}

function showKrwMiniChips(krwVal) {
  const row = document.getElementById('krwOutputRow');
  row.innerHTML = TOP5.map(code => {
    const c = CURRENCIES.find(x => x.code === code);
    const r = rates[code];
    if (!c || !r) return '';
    const amt = krwVal * r;
    return `<div class="krw-mini-chip">
      <img class="mini-flag" src="${flagUrl(c.flag)}" alt="${code}" onerror="this.style.display='none'">
      ${c.sym} ${fmtForeign(amt)}
    </div>`;
  }).join('');
  row.classList.add('show');
}

/* 콤마 포함 문자열에서 숫자 추출 */
function getRawKrw() {
  const raw = document.getElementById('krwInput').value.replace(/,/g,'');
  return parseFloat(raw) || 0;
}

document.getElementById('krwInput').addEventListener('input', function() {
  const cursor = this.selectionStart;
  const prevLen = this.value.length;
  const digits = this.value.replace(/[^0-9]/g,'');
  const num = parseFloat(digits) || 0;
  const formatted = num > 0 ? num.toLocaleString('ko-KR') : '';
  this.value = formatted;
  const diff = formatted.length - prevLen;
  try { this.setSelectionRange(cursor + diff, cursor + diff); } catch(e){}

  CURRENCIES.forEach(c => {
    const ki = document.getElementById('ki_' + c.code);
    if (ki) ki.value = '';
  });
  if (!num || num <= 0) {
    document.getElementById('krwHint').textContent = '금액을 입력하세요';
    document.getElementById('krwOutputRow').classList.remove('show');
    CURRENCIES.forEach(c => {
      const fi = document.getElementById('fi_' + c.code);
      if (fi) fi.value = '';
    });
    return;
  }
  document.getElementById('krwHint').textContent = '₩' + num.toLocaleString('ko-KR') + ' 환산 결과';
  showKrwMiniChips(num);
  propagateKrw(num);
});

function filterGroup(el, group) {
  currentGroup = group;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderCards();
  const kv = getRawKrw();
  if (kv > 0) propagateKrw(kv);
}

fetchRates();

/* ── 실시간 자동 갱신: 10분마다 환율 데이터 다시 불러오기 ── */
setInterval(fetchRates, 10 * 60 * 1000);
</script>
